name: Deploy Phonedash

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: centered-cursor-392711
      CLUSTER_NAME: mittai
      CLUSTER_ZONE: us-central1-a
      IMAGE_NAME: harbor.mittai.health/socialhi5/restaurant/aiphonedash/client

    steps:
      - name: Checkout Application Repository
        uses: actions/checkout@v4
        with:
          repository: Trysimmer-org/RestaurantAIDash-Client
          ref: userdashboard
          token: ${{ secrets.GH_PAT }}
          
      - name: Debug
        run: |
          pwd
          ls -la
          find . -name cloudbuild.yaml
          
      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Push Image
        run: |
          cd view
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions=_IMAGE_TAG=${IMAGE_TAG}

      - name: Install GKE Auth Plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE Credentials
        working-directory: view
        run: |
          gcloud container clusters get-credentials ${CLUSTER_NAME} \
            --zone ${CLUSTER_ZONE} \
            --project ${PROJECT_ID}

      - name: Configure kubectl
        run: |
          export USE_GKE_GCLOUD_AUTH_PLUGIN=True
          echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> $GITHUB_ENV

      - name: Update Deployment Image
        run: |
          kubectl set image deployment/phonedash-frontend-green \
            phonedash-frontend-green=${IMAGE_NAME}:${IMAGE_TAG}

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/phonedash-frontend-green --timeout=5m
